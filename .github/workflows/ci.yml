name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      PYTHONUTF8: '1'

    steps:
    - name: Enable Git symlinks on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: git config --global core.symlinks true

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Rust (nightly)
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: nightly
        components: rustc-dev llvm-tools cargo

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Generate configuration files
      run: python build.py gen-files

    - name: Cache cargo dependencies
      uses: Swatinem/rust-cache@v2
 
    - name: Build backend and tools
      run: python build.py ci

    - name: Run cargo unit tests
      run: cargo test

    - name: Run integration tests (debug mode)
      run: python Tester.py

    - name: Run integration tests (release mode)
      run: python Tester.py --release
